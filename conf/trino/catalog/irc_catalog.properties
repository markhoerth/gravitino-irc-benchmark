# ─────────────────────────────────────────────────────────────────────────────
# Trino Iceberg Catalog — Gravitino IRC (Full Server)
# Catalog name in Trino: 'gravitino_irc'
# ─────────────────────────────────────────────────────────────────────────────

connector.name=iceberg

# ── REST Catalog ──────────────────────────────────────────────────────────────
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://gravitino:9001/iceberg/
# warehouse = Gravitino catalog name (used by dynamic-config-provider to route)
iceberg.rest-catalog.warehouse=irc_catalog

# ── AWS S3 ────────────────────────────────────────────────────────────────────
fs.native-s3.enabled=true
s3.region=us-east-2
s3.aws-access-key=${env:AWS_ACCESS_KEY_ID}
s3.aws-secret-key=${env:AWS_SECRET_ACCESS_KEY}

# ── Iceberg Settings ──────────────────────────────────────────────────────────
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD
