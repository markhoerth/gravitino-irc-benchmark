###############################################################################
# Gravitino IRC Benchmark Environment (Full Server)
#
# Purpose: Reproduce and benchmark Gravitino IRC behavior using the full
#          Gravitino server with dynamic-config-provider. This deployment
#          matches enterprise deployments (RBC, Wells Fargo) and exercises
#          the hook/dispatcher chain (IcebergTableHookDispatcher).
#
# Services: PostgreSQL | Gravitino 1.2.0 (Full Server + IRC) | Trino | Python
#
# Prerequisites:
#   - AWS credentials (IAM instance role on EC2, or explicit keys locally)
#   - S3 bucket created
#   - .env file created from .env.example
#
# Usage:
#   make up          — start all services
#   make load-data   — register NYC taxi Parquet files as Iceberg table
#   make benchmark   — run full benchmark suite (REST + Trino)
#   make down        — stop services
#   make down-clean  — stop and wipe all volumes
###############################################################################

name: gravitino-irc-benchmark

networks:
  bench-net:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # Single Postgres instance serving two roles via separate databases:
  #   - gravitino_meta:  Gravitino entity store (metalakes, catalogs, etc.)
  #   - iceberg_catalog: IRC JDBC catalog backend (Iceberg table metadata)
  # Gravitino auto-creates its entity-store schema on first boot; the Iceberg
  # JDBC catalog auto-initializes on first use.
  postgres:
    image: postgres:15
    container_name: postgres
    networks: [bench-net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init/pg-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/init/schema-1.2.0-postgresql.sql:/docker-entrypoint-initdb.d/02-gravitino-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Gravitino Full Server + IRC ────────────────────────────────────────────
  # Full Gravitino 1.2.0 server with IRC as auxiliary service using
  # dynamic-config-provider. This path exercises IcebergTableHookDispatcher.
  #
  # Gravitino API: http://localhost:${GRAVITINO_API_PORT}/api
  # IRC endpoint:  http://localhost:${IRC_PORT}/iceberg/
  gravitino:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.gravitino
    image: gravitino-irc-benchmark:1.2.0
    container_name: gravitino
    networks: [bench-net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${GRAVITINO_API_PORT:-8090}:8090"
      - "${IRC_PORT}:9001"
    environment:
      # Entity store — Gravitino's own metadata
      GRAVITINO_ENTITY_STORE_URL: "jdbc:postgresql://postgres:5432/gravitino_meta"
      GRAVITINO_ENTITY_STORE_USER: ${POSTGRES_USER}
      GRAVITINO_ENTITY_STORE_PASSWORD: ${POSTGRES_PASSWORD}
      # IRC catalog — Iceberg JDBC backend
      GRAVITINO_IRC_JDBC_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB}"
      GRAVITINO_IRC_JDBC_USER: ${POSTGRES_USER}
      GRAVITINO_IRC_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      # S3 storage
      GRAVITINO_WAREHOUSE: "s3://${S3_BUCKET}/"
      GRAVITINO_S3_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      GRAVITINO_S3_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      GRAVITINO_S3_REGION: ${AWS_REGION}
      # Metalake and catalog names
      GRAVITINO_METALAKE: benchmark
      GRAVITINO_CATALOG_NAME: irc_catalog
      # Pass-through for SDK-level calls
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/iceberg/v1/config"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s
    restart: unless-stopped

  # ── Trino ──────────────────────────────────────────────────────────────────
  # Trino with Iceberg connector pointing at Gravitino IRC via REST catalog.
  # Web UI: http://localhost:${TRINO_PORT}
  # Shell:  make trino-shell
  trino:
    image: trinodb/trino:469
    container_name: trino
    networks: [bench-net]
    depends_on:
      gravitino:
        condition: service_healthy
    ports:
      - "${TRINO_PORT}:8080"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./conf/trino/config.properties:/etc/trino/config.properties:ro
      - ./conf/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./conf/trino/node.properties:/etc/trino/node.properties:ro
      - ./conf/trino/catalog/irc_catalog.properties:/etc/trino/catalog/irc_catalog.properties:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/status"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ── Python ─────────────────────────────────────────────────────────────────
  # Runs the data loader and benchmark scripts.
  python:
    image: python:3.11-slim
    container_name: python
    networks: [bench-net]
    depends_on:
      gravitino:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      IRC_URI: http://gravitino:9001/iceberg
      GRAVITINO_API: http://gravitino:8090/api
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
    volumes:
      - ./scripts:/scripts:ro
    working_dir: /scripts
    command: >
      /bin/sh -c "
        pip install --quiet pyiceberg==0.8.0 pyarrow boto3 trino requests tabulate &&
        tail -f /dev/null
      "
    restart: unless-stopped
